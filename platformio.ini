build_flags =
  ${env:esp32s3_lstm.build_flags}
  -D CLUSTER_ROLE_COORD=1
  -D CLUSTER_BOARD_ID=0
  -D CLUSTER_WIFI_AP_MODE=1
  -D CLUSTER_WIFI_PING_ONLY=1
  -D CLUSTER_ENABLE_OTA=1
  -D CLUSTER_ENABLE_HTTP_UPDATE=1

